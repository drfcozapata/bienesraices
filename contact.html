<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="author" content="Francisco Zapata" />
		<title>Contacto</title>
		<link rel="stylesheet" href="css/app.css" />
	</head>

	<body>
		<header class="header">
			<div class="container header-content">
				<div class="navbar">
					<a href="/"
						><img src="./img/logo.svg" alt="Logo de F&A Bienes Raíces"
					/></a>
					<nav class="navegation">
						<a href="about.html">Nosotros</a>
						<a href="ads.html">Anuncios</a>
						<a href="blog.html">Blog</a>
						<a href="contact.html">Contacto</a>
					</nav>
				</div>
			</div>
		</header>

		<main class="container section" style="margin-bottom: 80px;">
			<h2>Contacto</h2>
			<p>
				Llena el siguiente formulario y un asesor se pondrá en contacto contigo a la
				brevedad.
			</p>
			<form class="form" id="contact-form" style="max-width: 600px; margin: 0 auto;">
					<label for="nombre">Nombre</label>
					<input type="text" id="nombre" placeholder="Tu nombre" required />

					<label for="email">Email</label>
					<input type="email" id="email" placeholder="Tu correo electrónico" required />

					<label for="telefono">Teléfono</label>
					<input type="tel" id="telefono" placeholder="Tu número de teléfono" required />

					<label for="mensaje">Mensaje</label>
					<textarea id="mensaje" placeholder="Escribe tu mensaje aquí" required></textarea>

					<p>Contacto por:</p>
					<div class="contact-form">
						<label for="compra">
							<input type="radio" name="tipo" id="compra" value="compra" checked />
							Compra
						</label>
						<label for="venta">
							<input type="radio" name="tipo" id="venta" value="venta" />
							Venta
						</label>
					</div>

					<input type="submit" value="Enviar" class="green-button" />
			</form>
		</main>

		<div id="toast" class="toast"></div>

		<footer class="footer section">
			<div class="container footer-container">
				<nav class="navegation">
					<a href="about.html">Nosotros</a>
					<a href="ads.html">Anuncios</a>
					<a href="blog.html">Blog</a>
					<a href="contact.html">Contacto</a>
				</nav>
				<p class="copyright">
					Todos los derechos reservados. &copy; 2023 by Francisco Zapata
				</p>
			</div>
		</footer>

		<script>
			document.getElementById('contact-form').addEventListener('submit', function (e) {
				e.preventDefault();
				var toast = document.getElementById('toast');
				toast.textContent = '¡Mensaje enviado con éxito! Nos pondremos en contacto pronto.';
				toast.classList.add('show');
				setTimeout(function () {
					toast.classList.remove('show');
				}, 3000);
				this.reset();
			});
		</script>
	</body>
</html>
